  <!-- Left face silhouette (white, offset left) -->
  <g fill="#ffffff" opacity="0.45">
    <circle cx="36" cy="38" r="11"/>
    <path d="M18 75 Q18 58 36 58 Q54 58 54 75"/>
  </g>

  <!-- Right face silhouette (white, full opacity) -->
  <g fill="#ffffff">
    <circle cx="48" cy="38" r="11"/>
    <path d="M30 75 Q30 58 48 58 Q66 58 66 75"/>
  </g>

  <!-- Wordmark -->
  <text x="102" y="56"
        font-family="'SF Pro Display','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="36" font-weight="700" letter-spacing="-0.5"
        fill="#0F0F0F">Persona</text>

  <!-- Subtitle -->
  <text x="104" y="76"
        font-family="'SF Pro Display','Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="13" font-weight="400" letter-spacing="0.5"
        fill="#6e6e73">AI Face Swap  ·  Real-time</text>
</svg>
